# ================================================================
# Production configuration for Railway deployment
# Activated when SPRING_PROFILES_ACTIVE=production
# ================================================================

# Server port - Railway injects PORT env variable
server.port=${PORT:8080}

# ================================================================
# we are using Railway's Postgres, so we will use the DATABASE_URL environment variable
# Database (Railway Postgres)
# Railway provides DATABASE_URL automatically when you add Postgres
# Format: postgresql://user:pass@host:port/dbname
# ================================================================
spring.datasource.url=${SPRING_DATASOURCE_URL}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD}
spring.datasource.driver-class-name=org.postgresql.Driver

# ================================================================
# JPA / Hibernate
# ================================================================
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.properties.hibernate.jdbc.lob.non_contextual_creation=true

# Connection pool (smaller for free tier)
spring.datasource.hikari.maximum-pool-size=5
spring.datasource.hikari.minimum-idle=2
spring.datasource.hikari.connection-timeout=30000

# ================================================================
# Logging
# ================================================================
logging.level.root=INFO
logging.level.com.opensensemap.edu=INFO
logging.level.org.hibernate.SQL=WARN

# ================================================================
# Thymeleaf (disable cache = false for production)
# ================================================================
spring.thymeleaf.cache=true

# ================================================================
# Flyway (if you're using it)
# ================================================================
spring.flyway.enabled=false
spring.flyway.baseline-on-migrate=true