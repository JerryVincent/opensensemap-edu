<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" 
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security" lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title th:text="${title} + ' - OpenSenseMap Edu'">Scenario Progress</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css">
    <style>
        :root { --dark-bg: #2c3e50; }
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background-color: #f8f9fa; }
        .navbar { background: linear-gradient(135deg, var(--dark-bg) 0%, #34495e 100%); }
        .content-card { border: none; border-radius: 10px; box-shadow: 0 2px 8px rgba(0,0,0,0.08); }
        .progress-header { background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); color: white; padding: 2rem 0; }
        .task-item { border-left: 3px solid #ddd; transition: all 0.2s; }
        .task-item.completed { border-left-color: #2ecc71; background-color: #f8fff8; }
        .task-item.in-progress { border-left-color: #f39c12; background-color: #fffef8; }
        .task-number { width: 35px; height: 35px; border-radius: 50%; display: flex; align-items: center; 
                       justify-content: center; font-weight: bold; background: #f0f0f0; }
        .task-item.completed .task-number { background: #2ecc71; color: white; }
    </style>
</head>
<body>
<!-- Navigation -->
<nav class="navbar navbar-expand-lg navbar-dark">
    <div class="container">
        <a class="navbar-brand" href="/"><i class="bi bi-cloud-sun"></i> OpenSenseMap Edu</a>
        <div class="collapse navbar-collapse" id="navbarNav">
            <ul class="navbar-nav ms-auto">
                <li class="nav-item"><a class="nav-link" href="/"><i class="bi bi-house"></i> Home</a></li>
                <li class="nav-item"><a class="nav-link" href="/scenarios"><i class="bi bi-journal-code"></i> Scenarios</a></li>
                <li class="nav-item"><a class="nav-link" href="/dashboard"><i class="bi bi-speedometer2"></i> Dashboard</a></li>
            </ul>
        </div>
    </div>
</nav>

<!-- Progress Header -->
<div class="progress-header">
    <div class="container">
        <div class="d-flex justify-content-between align-items-center">
            <div>
                <h2 class="mb-1" th:text="${scenario.title}">Scenario Title</h2>
                <p class="mb-0 opacity-75" th:text="${scenario.role}">Your Role</p>
            </div>
            <div class="text-end">
                <div class="display-4" th:text="${progress.completionPercentage} + '%'">0%</div>
                <small>Complete</small>
            </div>
        </div>
        <div class="progress mt-3" style="height: 10px;">
            <div class="progress-bar bg-success" role="progressbar" 
                 th:style="'width: ' + ${progress.completionPercentage} + '%'"></div>
        </div>
    </div>
</div>

<div class="container py-4">
    <div class="row">
        <div class="col-lg-8">
            <!-- Tasks List -->
            <div class="card content-card">
                <div class="card-header bg-white">
                    <h5 class="mb-0"><i class="bi bi-list-check"></i> Tasks</h5>
                </div>
                <div class="card-body p-0">
                    <div th:each="task, iterStat : ${tasks}" 
                         class="task-item p-3 d-flex align-items-center border-bottom">
                        <div class="task-number me-3" th:text="${task.taskOrder}">1</div>
                        <div class="flex-grow-1">
                            <h6 class="mb-1" th:text="${task.title}">Task Title</h6>
                            <small class="text-muted" th:text="${#strings.abbreviate(task.description, 80)}">Description...</small>
                        </div>
                        <div class="text-end">
                            <span class="badge bg-warning text-dark me-2" th:text="${task.points} + ' pts'">10 pts</span>
                            <a th:href="@{/scenarios/{sId}/task/{tId}(sId=${scenario.id}, tId=${task.id})}" 
                               class="btn btn-sm btn-primary">
                                <i class="bi bi-play-fill"></i> Start
                            </a>
                        </div>
                    </div>
                </div>
            </div>
        </div>

        <div class="col-lg-4">
            <!-- Progress Summary -->
            <div class="card content-card mb-4">
                <div class="card-body text-center">
                    <h3 th:text="${progress.score}">0</h3>
                    <p class="text-muted mb-0">Points Earned</p>
                </div>
            </div>

            <div class="card content-card mb-4">
                <div class="card-body text-center">
                    <h3 th:text="${progress.tasksCompleted} + ' / ' + ${progress.totalTasks}">0 / 0</h3>
                    <p class="text-muted mb-0">Tasks Completed</p>
                </div>
            </div>

            <a th:href="@{/dashboard}" class="btn btn-outline-secondary w-100">
                <i class="bi bi-arrow-left"></i> Back to Dashboard
            </a>
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
