<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title th:text="${title} + ' - OpenSenseMap Edu'">Register</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css">
    <style>
        body {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 2rem 0;
        }
        .register-card {
            background: white;
            border-radius: 15px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.2);
            overflow: hidden;
            max-width: 450px;
            width: 100%;
        }
        .register-header {
            background: linear-gradient(135deg, #2c3e50 0%, #34495e 100%);
            color: white;
            padding: 2rem;
            text-align: center;
        }
        .register-header i {
            font-size: 3rem;
            margin-bottom: 1rem;
        }
        .register-body {
            padding: 2rem;
        }
        .form-control:focus {
            border-color: #667eea;
            box-shadow: 0 0 0 0.2rem rgba(102, 126, 234, 0.25);
        }
        .btn-register {
            background: linear-gradient(135deg, #2ecc71 0%, #27ae60 100%);
            border: none;
            padding: 0.75rem;
            font-weight: 600;
        }
        .btn-register:hover {
            background: linear-gradient(135deg, #27ae60 0%, #2ecc71 100%);
        }
        .input-group-text {
            background-color: #f8f9fa;
            border-right: none;
        }
        .form-control {
            border-left: none;
        }
        .is-invalid {
            border-left: 1px solid #dc3545 !important;
        }
    </style>
</head>
<body>
    <div class="register-card">
        <div class="register-header">
            <i class="bi bi-person-plus"></i>
            <h3 class="mb-0">Create Account</h3>
            <p class="mb-0 mt-2 opacity-75">Join OpenSenseMap Edu</p>
        </div>
        <div class="register-body">
            <!-- Error Alert -->
            <div th:if="${error}" class="alert alert-danger" role="alert">
                <i class="bi bi-exclamation-triangle"></i>
                <span th:text="${error}">Error</span>
            </div>

            <form th:action="@{/register}" th:object="${registerForm}" method="post">
                <div class="mb-3">
                    <label for="username" class="form-label">Username *</label>
                    <div class="input-group">
                        <span class="input-group-text"><i class="bi bi-person"></i></span>
                        <input type="text" th:field="*{username}" 
                               th:class="${#fields.hasErrors('username')} ? 'form-control is-invalid' : 'form-control'"
                               id="username" placeholder="Choose a username">
                    </div>
                    <div th:if="${#fields.hasErrors('username')}" class="text-danger small mt-1">
                        <span th:errors="*{username}">Username error</span>
                    </div>
                </div>

                <div class="mb-3">
                    <label for="email" class="form-label">Email *</label>
                    <div class="input-group">
                        <span class="input-group-text"><i class="bi bi-envelope"></i></span>
                        <input type="email" th:field="*{email}"
                               th:class="${#fields.hasErrors('email')} ? 'form-control is-invalid' : 'form-control'"
                               id="email" placeholder="your@email.com">
                    </div>
                    <div th:if="${#fields.hasErrors('email')}" class="text-danger small mt-1">
                        <span th:errors="*{email}">Email error</span>
                    </div>
                </div>

                <div class="mb-3">
                    <label for="fullName" class="form-label">Full Name</label>
                    <div class="input-group">
                        <span class="input-group-text"><i class="bi bi-card-text"></i></span>
                        <input type="text" th:field="*{fullName}" class="form-control"
                               id="fullName" placeholder="Your full name (optional)">
                    </div>
                </div>

                <div class="mb-3">
                    <label for="password" class="form-label">Password *</label>
                    <div class="input-group">
                        <span class="input-group-text"><i class="bi bi-lock"></i></span>
                        <input type="password" th:field="*{password}"
                               th:class="${#fields.hasErrors('password')} ? 'form-control is-invalid' : 'form-control'"
                               id="password" placeholder="At least 6 characters">
                    </div>
                    <div th:if="${#fields.hasErrors('password')}" class="text-danger small mt-1">
                        <span th:errors="*{password}">Password error</span>
                    </div>
                </div>

                <div class="mb-4">
                    <label for="confirmPassword" class="form-label">Confirm Password *</label>
                    <div class="input-group">
                        <span class="input-group-text"><i class="bi bi-lock-fill"></i></span>
                        <input type="password" th:field="*{confirmPassword}"
                               th:class="${#fields.hasErrors('confirmPassword')} ? 'form-control is-invalid' : 'form-control'"
                               id="confirmPassword" placeholder="Repeat your password">
                    </div>
                    <div th:if="${#fields.hasErrors('confirmPassword')}" class="text-danger small mt-1">
                        <span th:errors="*{confirmPassword}">Confirm error</span>
                    </div>
                </div>

                <button type="submit" class="btn btn-success btn-register w-100 mb-3">
                    <i class="bi bi-person-check"></i> Create Account
                </button>
            </form>

            <div class="text-center">
                <p class="mb-0">Already have an account?
                    <a th:href="@{/login}">Sign In</a>
                </p>
            </div>

            <div class="text-center mt-4">
                <a th:href="@{/}" class="text-muted">
                    <i class="bi bi-arrow-left"></i> Back to Home
                </a>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
